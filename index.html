<!DOCTYPE html>
<html>
<body>
<form id="myQuiz">
<div class="question">
<p>1. What does DOM stand for?</p>
<label><input type="radio" name="q1" value="a"> Document Object
Model</label><br>
<label><input type="radio" name="q1" value="b"> Dormant Old
Mouse</label>
</div>
<button type="button" onclick="calculateScore()">Submit</button>
</form>
<div id="result"></div>
</body>
</html>
<script>
function calculateScore() {
const answers = { q1: "a" };
let score = 0;
const form = document.getElementById('myQuiz');
const formData = new FormData(form);
for (let [key, value] of formData.entries()) {
if (value === answers[key]) score++;
}
document.getElementById('result').innerText = `Your score: ${score}`;
}
</script>
