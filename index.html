<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Media Lists</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    .inputs,
    .lists {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .inputs label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
    }

    .list-column {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 4px;
    }

    .list-column h3 {
      margin-top: 0;
      text-align: center;
    }

    ul {
      padding-left: 18px;
    }

    li {
      cursor: pointer;
      user-select: none;
    }

    li:hover {
      text-decoration: line-through;
      color: #c00;
    }

    .hint {
      text-align: center;
      font-size: 0.85em;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Media Lists</h1>

  <div class="controls">
    <button id="saveBtn">Save</button>
    <input type="file" id="loadInput" accept="application/json" />
  </div>

  <div class="inputs">
    <div>
      <label>Movies</label>
      <input id="moviesInput" type="text" />
    </div>
    <div>
      <label>Shows</label>
      <input id="showsInput" type="text" />
    </div>
    <div>
      <label>Books</label>
      <input id="booksInput" type="text" />
    </div>
    <div>
      <label>Games</label>
      <input id="gamesInput" type="text" />
    </div>
    <div>
      <label>Other</label>
      <input id="otherInput" type="text" />
    </div>
  </div>

  <div class="lists" style="margin-top: 25px;">
    <div class="list-column">
      <h3>Movies</h3>
      <ul id="moviesList"></ul>
    </div>
    <div class="list-column">
      <h3>Shows</h3>
      <ul id="showsList"></ul>
    </div>
    <div class="list-column">
      <h3>Books</h3>
      <ul id="booksList"></ul>
    </div>
    <div class="list-column">
      <h3>Games</h3>
      <ul id="gamesList"></ul>
    </div>
    <div class="list-column">
      <h3>Other</h3>
      <ul id="otherList"></ul>
    </div>
  </div>

  <div class="hint">
    Press Enter to add · Click an item to remove it
  </div>

  <script>
    const TYPES = ["movies", "shows", "books", "games", "other"];
    const lists = {};

    /* ---------- Utilities ---------- */

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function save(type) {
      localStorage.setItem(type, JSON.stringify([...lists[type]]));
    }

    function render(type) {
      const ul = document.getElementById(type + "List");
      ul.innerHTML = "";

      [...lists[type]]
        .sort((a, b) => a.localeCompare(b))
        .forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;

          li.addEventListener("click", () => {
            lists[type].delete(item);
            save(type);
            render(type);
          });

          ul.appendChild(li);
        });
    }

    /* ---------- Setup ---------- */

    TYPES.forEach(type => {
      const saved = JSON.parse(localStorage.getItem(type)) || [];
      lists[type] = new Set(saved);

      render(type);

      const input = document.getElementById(type + "Input");
      input.addEventListener("keydown", e => {
        if (e.key !== "Enter") return;

        const raw = input.value;
        const value = normalize(raw);
        if (!value) return;

        if (![...lists[type]].map(normalize).includes(value)) {
          lists[type].add(raw.trim());
          save(type);
          render(type);
        }

        input.value = "";
      });
    });

    /* ---------- Save ---------- */

    document.getElementById("saveBtn").addEventListener("click", () => {
      const data = {};
      TYPES.forEach(type => {
        data[type] = [...lists[type]];
      });

      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: "application/json" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "media-lists.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    /* ---------- Load ---------- */

    document.getElementById("loadInput").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);

          TYPES.forEach(type => {
            lists[type] = new Set(data[type] || []);
            save(type);
            render(type);
          });
        } catch {
          alert("Invalid file.");
        }
      };

      reader.readAsText(file);
    });
  </script>

</body>
</html>
