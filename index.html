<!DOCTYPE html>
<html>
  <head>
    <title>Evan Solid's CSCI 263 Webpage!</title>
	  <link rel="stylesheet" href = "mystyle.css">
  </head>
  <body>
    <h1 id="heading">Hello!</h1>
    <button id="myButton">Click here!</button>
    
    <div class="tab">
      <button class="tablinks" onclick="openTab(event, 'Final')" id="defaultOpen">Final Project</button>
      <button class="tablinks" onclick="openTab(event, 'Art')">My Art</button>
      <button class="tablinks" onclick="openTab(event, 'Books')">Books</button>
    </div>
    <div id="Final" class="tabcontent">
      <h3>AI Data Privacy</h3>
      <p>OpenAI is stealing everything and theyre gonna kill us all.</p>
    </div>
    
    <div id="Art" class="tabcontent">
      <h3>My Art</h3>
      <p>Idk I'll put some fractals here later probably.</p>
    </div>
    
  <div id="Books" class="tabcontent">
    <h3>Books</h3>
    <p>Maybe some book reviews?</p>
  </div>
  </body>
  <script>
    const button = document.getElementById("myButton");
    const heading = document.getElementById("heading");
	const colors = ["red", "orange", "blue", "green", "yellow", "purple"];
    button.addEventListener("click", function() {
	  const index = Math.floor(Math.random() * colors.length);
	  const randomColor = colors[index];
      heading.style.color = randomColor;
    });

	function openTab(evt, tabName) {
	  // Declare all variables
	  var i, tabcontent, tablinks;
	
	  // Get all elements with class="tabcontent" and hide them
	  tabcontent = document.getElementsByClassName("tabcontent");
	  for (i = 0; i < tabcontent.length; i++) {
		tabcontent[i].style.display = "none";
	  }
	
	  // Get all elements with class="tablinks" and remove the class "active"
	  tablinks = document.getElementsByClassName("tablinks");
	  for (i = 0; i < tablinks.length; i++) {
		tablinks[i].className = tablinks[i].className.replace(" active", "");
	  }
	
	  // Show the current tab, and add an "active" class to the button that opened the tab
	  document.getElementById(tabName).style.display = "block";
	  evt.currentTarget.className += " active";
	} 

	document.getElementById("defaultOpen").click();
  </script>
</html>
